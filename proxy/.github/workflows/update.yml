name: Update Verified Proxy Lists
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: pip install requests telethon
    - run: python main.py --top 200  # ← main.py!
    - run: |
        git config user.name "Proxy Bot"
        git config user.email "bot@github.com"
        git add verified/ || true
        git diff --staged --quiet || git commit -m "🔥 Verified proxies $(date)"
        git push || true


