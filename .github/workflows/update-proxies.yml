name: Update Proxies

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'proxy/main.py'
      - 'proxy/test_proxies.py'

env:
  PYTHON_VERSION: '3.11'
  WORKER_URL: 'https://telegram-proxy-bot.krichencat.workers.dev'
  BOT_TOKEN: '8664454935:AAFPk1ehMIJB1r9MrDRTrb9JDtpHYjg1Vjc'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests geoip2 ipaddress httpx
      
      - name: Run main.py
        run: |
          cd proxy
          python main.py
      
      - name: Run test_proxies.py
        run: |
          cd proxy
          python test_proxies.py
      
      - name: Send to Worker
        run: |
          cd proxy
          python send_to_worker.py
      
      - name: Send notification
        if: always()
        run: |
          cd proxy
          python send_notification.py
        env:
          STATUS: ${{ job.status }}
